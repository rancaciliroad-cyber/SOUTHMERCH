<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Southteam | Shopee-like</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">Southteam</div>
    <input type="text" class="search" placeholder="Cari produk...">
    <div class="icons">
      <button id="loginBtn" class="btn">Login</button>
      <button id="cartBtn" class="btn">Keranjang</button>
      <button id="notifBtn" class="btn">🔔</button>
    </div>
  </header>
  <section class="banner">
    <img src="banner1.jpg" alt="Promo 1">
    <img src="banner2.jpg" alt="Promo 2">
  </section>
  <section class="produk">
    <h2>Produk Populer</h2>
    <div class="grid">
      <div class="item">
        <img src="produk1.jpg" alt="Produk 1">
        <p>Rp 100.000</p>
        <button class="addCart btn">Beli</button>
      </div>
    </div>
  </section>

  <!-- Modal -->
  <div id="loginModal" class="modal">...</div>
  <div id="cartModal" class="modal">...</div>
  <div id="notifModal" class="modal">...</div>

  <script src="script.js"></script>
</body>
    </html>
